version: '3.8'

services:
  # Сервис панели регистрации
  matrix-registration-panel:
    build: .
    container_name: matrix-registration-panel
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    networks:
      - synapse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  synapse-network:
    external: true
    name: synapse-network
